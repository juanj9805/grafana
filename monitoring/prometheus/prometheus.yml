global:
  scrape_interval: 5s  # Cada cuánto tiempo Prometheus recolecta métricas

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['prometheus:9090']

  - job_name: 'docker'
    static_configs:
      - targets: ['172.17.0.1:9323']

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
